<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="be" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="22" y="30" font-size="15" font-weight="700" fill="#1e293b">Build / execute — the graph designs &amp; tests the method, a durable engine runs it</text>

  <!-- BUILD -->
  <rect x="22" y="54" width="280" height="200" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="162" y="80" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">BUILD + TEST — the graph</text>
  <text x="162" y="96" font-size="10.5" fill="#64748b" text-anchor="middle">the belief-view: decidable · traceable · defeasible</text>
  <text x="40" y="124" font-size="11" fill="#475569">• concepts → stabilize → fixpoint</text>
  <text x="40" y="146" font-size="11" fill="#475569">• JTMS retraction (coherence under change)</text>
  <text x="40" y="168" font-size="11" fill="#475569">• checkCompose — compose on typed contracts</text>
  <text x="40" y="190" font-size="11" fill="#475569">• validate the method on cases</text>
  <text x="40" y="212" font-size="11" fill="#475569">• forge · crystallize · abstract (the library)</text>
  <text x="162" y="240" font-size="10.5" font-weight="700" fill="#155e75" text-anchor="middle">lib/graph + lib/authoring</text>

  <!-- C-xlate -->
  <line x1="302" y1="154" x2="338" y2="154" stroke="#64748b" stroke-width="2" marker-end="url(#be)"/>
  <rect x="338" y="120" width="118" height="68" rx="9" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="397" y="146" font-size="12" font-weight="700" fill="#92400e" text-anchor="middle">C-xlate</text>
  <text x="397" y="164" font-size="10" fill="#78350f" text-anchor="middle">compile →</text>
  <text x="397" y="178" font-size="10" fill="#78350f" text-anchor="middle">a workflow-net</text>
  <line x1="456" y1="154" x2="492" y2="154" stroke="#64748b" stroke-width="2" marker-end="url(#be)"/>

  <!-- EXECUTE -->
  <rect x="492" y="54" width="286" height="200" rx="10" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="635" y="80" font-size="13" font-weight="700" fill="#065f46" text-anchor="middle">EXECUTE — the durable engine</text>
  <text x="635" y="96" font-size="10.5" fill="#64748b" text-anchor="middle">durable · crash-resumable · at scale</text>
  <text x="510" y="124" font-size="11" fill="#475569">• case records = tokens walked through the net</text>
  <text x="510" y="146" font-size="11" fill="#475569">• durable marking + content-memo (replay)</text>
  <text x="510" y="168" font-size="11" fill="#475569">• map fan-out → JOIN → fold ; fail-fast</text>
  <text x="510" y="190" font-size="11" fill="#475569">• contract guard: assert-at-runtime, then commit</text>
  <text x="510" y="212" font-size="11" fill="#475569">• crash-resume · audit trail</text>
  <text x="635" y="240" font-size="10.5" font-weight="700" fill="#065f46" text-anchor="middle">lib/durable (a CheckpointStore + runFlow)</text>

  <text x="22" y="282" font-size="10.5" fill="#64748b">A reactive belief-VIEW atop a durable executor — the boundary the conception keeps honest.</text>
</svg>
