<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="d" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="dp" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <text x="22" y="28" font-size="15" font-weight="700" fill="#1e293b">Distributed: dispatch sub-graphs to separate workers; proxy the model call</text>
  <text x="22" y="48" font-size="11.5" fill="#64748b">nothing non-serializable crosses — JSON conceptMap + seed down, snapshot up, ask() proxied back</text>

  <!-- parent -->
  <rect x="290" y="70" width="180" height="58" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="380" y="94" font-size="13" font-weight="700" fill="#3730a3" text-anchor="middle">parent graph</text>
  <text x="380" y="113" font-size="10.5" fill="#475569" text-anchor="middle">holds the real model `ask`</text>

  <!-- workers -->
  <rect x="60"  y="210" width="180" height="64" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="150" y="234" font-size="12.5" font-weight="700" fill="#115e59" text-anchor="middle">worker (process)</text>
  <text x="150" y="252" font-size="10" fill="#475569" text-anchor="middle">loads concepts + providers</text>
  <text x="150" y="266" font-size="10" fill="#475569" text-anchor="middle">stabilizes a sub-graph</text>

  <rect x="290" y="210" width="180" height="64" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="380" y="234" font-size="12.5" font-weight="700" fill="#115e59" text-anchor="middle">worker (process)</text>
  <text x="380" y="252" font-size="10" fill="#475569" text-anchor="middle">local providers run here</text>
  <text x="380" y="266" font-size="10" fill="#475569" text-anchor="middle">(geo, checkers, …)</text>

  <rect x="520" y="210" width="180" height="64" rx="10" fill="#f0fdfa" stroke="#0d9488" stroke-width="2"/>
  <text x="610" y="234" font-size="12.5" font-weight="700" fill="#115e59" text-anchor="middle">worker (process)</text>
  <text x="610" y="252" font-size="10" fill="#475569" text-anchor="middle">… or a waiting remote</text>
  <text x="610" y="266" font-size="10" fill="#475569" text-anchor="middle">instance (TCP later)</text>

  <!-- down: conceptMap + seed -->
  <line x1="330" y1="128" x2="160" y2="208" stroke="#475569" stroke-width="1.8" marker-end="url(#d)"/>
  <line x1="380" y1="128" x2="380" y2="208" stroke="#475569" stroke-width="1.8" marker-end="url(#d)"/>
  <line x1="430" y1="128" x2="600" y2="208" stroke="#475569" stroke-width="1.8" marker-end="url(#d)"/>
  <text x="92" y="170" font-size="10.5" fill="#475569">conceptMap + seed ↓</text>

  <!-- up: snapshot -->
  <path d="M470,240 L700,240 L700,150 L472,118" fill="none" stroke="#10b981" stroke-width="1.8" marker-end="url(#d)" opacity="0.85"/>
  <text x="600" y="140" font-size="10.5" fill="#059669">↑ stabilized snapshot</text>

  <!-- proxied ask -->
  <path d="M380,208 L380,170 L300,170 L300,130" fill="none" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#dp)"/>
  <text x="150" y="150" font-size="10.5" font-weight="700" fill="#7c3aed">ask() proxied ↑ (model call = generic templated request)</text>
</svg>
