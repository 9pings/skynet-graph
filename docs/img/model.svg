<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#f59e0b"/>
    </marker>
  </defs>
  <text x="22" y="30" font-size="15" font-weight="700" fill="#1e293b">Objects carry typed facts — concepts are rules that cast facts onto them</text>

  <circle cx="120" cy="150" r="34" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="120" y="156" font-size="16" font-weight="700" fill="#155e75" text-anchor="middle">A</text>
  <text x="120" y="208" font-size="11" fill="#475569" text-anchor="middle">Position {48.85, 2.35}</text>

  <circle cx="540" cy="150" r="34" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
  <text x="540" y="156" font-size="16" font-weight="700" fill="#155e75" text-anchor="middle">B</text>
  <text x="540" y="208" font-size="11" fill="#475569" text-anchor="middle">Position {1.35, 103.8}</text>

  <line x1="156" y1="150" x2="496" y2="150" stroke="#475569" stroke-width="2" marker-end="url(#a)"/>
  <rect x="298" y="122" width="128" height="56" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="362" y="145" font-size="12" font-weight="700" fill="#3730a3" text-anchor="middle">Segment A→B</text>
  <text x="362" y="164" font-size="11" fill="#475569" text-anchor="middle">Distance {inKm: 10728}</text>

  <rect x="262" y="234" width="232" height="52" rx="8" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
  <text x="378" y="254" font-size="11.5" font-weight="700" fill="#92400e" text-anchor="middle">concept "Distance" (a rule)</text>
  <text x="378" y="272" font-size="10.5" fill="#78350f" text-anchor="middle">require both Positions → provider → write inKm</text>
  <line x1="378" y1="234" x2="368" y2="180" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#ag)"/>
  <text x="612" y="150" font-size="11" fill="#94a3b8">nodes · segments</text>
  <text x="612" y="166" font-size="11" fill="#94a3b8">= typed-fact graph</text>
</svg>
