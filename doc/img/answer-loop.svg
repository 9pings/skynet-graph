<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="l" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
  </defs>
  <text x="22" y="28" font-size="15" font-weight="700" fill="#1e293b">The flagship: answer a huge prompt without a context-window blow-up</text>
  <text x="22" y="48" font-size="11.5" fill="#64748b">the graph is the working memory; every LLM call sees only bounded local context</text>

  <!-- root prompt -->
  <rect x="300" y="64" width="160" height="40" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="380" y="89" font-size="12" font-weight="700" fill="#3730a3" text-anchor="middle">prompt (root segment)</text>

  <!-- decompose into sub-segments -->
  <rect x="120" y="150" width="150" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="195" y="175" font-size="11.5" fill="#334155" text-anchor="middle">sub-problem 1</text>
  <rect x="305" y="150" width="150" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="380" y="175" font-size="11.5" fill="#334155" text-anchor="middle">sub-problem 2</text>
  <rect x="490" y="150" width="150" height="40" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.6"/>
  <text x="565" y="175" font-size="11.5" fill="#334155" text-anchor="middle">sub-problem 3</text>

  <line x1="350" y1="104" x2="205" y2="148" stroke="#475569" stroke-width="1.8" marker-end="url(#l)"/>
  <line x1="380" y1="104" x2="380" y2="148" stroke="#475569" stroke-width="1.8" marker-end="url(#l)"/>
  <line x1="410" y1="104" x2="555" y2="148" stroke="#475569" stroke-width="1.8" marker-end="url(#l)"/>
  <text x="130" y="128" font-size="11" font-weight="700" fill="#92400e">DECOMPOSE ↓ (a concept casts sub-path segments + bounded LLM calls)</text>

  <!-- leaf answers -->
  <rect x="120" y="222" width="150" height="36" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="195" y="245" font-size="11" fill="#065f46" text-anchor="middle">leaf answer</text>
  <rect x="305" y="222" width="150" height="36" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="380" y="245" font-size="11" fill="#065f46" text-anchor="middle">leaf answer</text>
  <rect x="490" y="222" width="150" height="36" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1.6"/>
  <text x="565" y="245" font-size="11" fill="#065f46" text-anchor="middle">leaf answer</text>
  <line x1="195" y1="190" x2="195" y2="220" stroke="#10b981" stroke-width="1.8" marker-end="url(#l)"/>
  <line x1="380" y1="190" x2="380" y2="220" stroke="#10b981" stroke-width="1.8" marker-end="url(#l)"/>
  <line x1="565" y1="190" x2="565" y2="220" stroke="#10b981" stroke-width="1.8" marker-end="url(#l)"/>

  <!-- synthesize up -->
  <rect x="300" y="284" width="160" height="38" rx="8" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
  <text x="380" y="308" font-size="12" font-weight="700" fill="#3730a3" text-anchor="middle">answer</text>
  <path d="M195,258 L195,303 L296,303" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#l)"/>
  <path d="M565,258 L565,303 L464,303" fill="none" stroke="#6366f1" stroke-width="1.8" marker-end="url(#l)"/>
  <line x1="380" y1="258" x2="380" y2="282" stroke="#6366f1" stroke-width="1.8" marker-end="url(#l)"/>
  <text x="478" y="278" font-size="11" font-weight="700" fill="#3730a3">SYNTHESIZE ↑ (bounded bottom-up rollup)</text>
</svg>
